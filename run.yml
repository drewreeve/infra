---
- name: Setup Loki
  hosts: loki
  roles:
    - role: docker
      become: true
      tags: docker
    - role: traefik
      tags: traefik
    - role: plex
      tags: plex
    - role: arr
      tags: arr
    - role: dockhand
      tags: dockhand
    - role: uptime_kuma
      tags: uptime_kuma
    - role: karakeep
      tags: karakeep
    - role: paperless
      tags: paperless
    - role: pricebuddy
      tags: pricebuddy

- name: Setup Cherrypi
  hosts: cherrypi
  roles:
    - role: docker
      become: true
      tags: docker
    - role: traefik
      tags: traefik
    - role: dockhand
      tags: dockhand
    - role: it-tools
      tags: it-tools

- name: Setup Neon
  hosts: neon
  pre_tasks:
    - name: Fetch become password
      ansible.builtin.set_fact:
        ansible_become_password: "{{ ansible_become_password }}"
      no_log: true
  roles:
    - role: postgres
      tags: postgres
